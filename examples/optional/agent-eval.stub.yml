name: Agent Eval

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pull_request_number:
        description: Pull request number to evaluate
        required: true
        type: number

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: agent-eval-${{ github.event.pull_request.number || inputs.pull_request_number }}
  cancel-in-progress: false

jobs:
  eval:
    name: Evaluate pull request
    # Disabled for MVP. Enable by setting AGENT_EVAL_ENABLED=true and adding `agent:eval` to a PR.
    if: >-
      vars.AGENT_EVAL_ENABLED == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event.action == 'labeled' && github.event.label.name == 'agent:eval')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve pull request number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request?.number ?? Number('${{ inputs.pull_request_number }}');
            if (!prNumber) {
              core.setFailed('No pull request number provided.');
              return;
            }
            core.setOutput('number', String(prNumber));

      - name: Dispatch evaluator agent runner
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            // TODO: Replace this placeholder with the Claude Code evaluator runner when custom eval is enabled.
            // Expected evaluator-agent behavior:
            // - Compare PR changes against issue and research spec.
            // - Check acceptance criteria coverage.
            // - Check test/evaluation evidence.
            // - Check docs learning checkpoint occurred.
            // - Check repo docs/ADR/domain instructions were followed.
            // - Comment with pass, needs changes, or blocked.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: [
                '## Agent Eval Pending',
                '',
                'The optional evaluator workflow is enabled, but the Claude Code evaluator runner is not wired yet.',
                '',
                'For MVP, leave `AGENT_EVAL_ENABLED` unset or `false` while Copilot review is evaluated on its own.'
              ].join('\n'),
            });
